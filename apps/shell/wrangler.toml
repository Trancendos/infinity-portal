# Cloudflare Pages Configuration — Infinity OS Shell
# Deploy: npx wrangler pages deploy dist --project-name=infinity-os-shell
name = "infinity-os-shell"
compatibility_date = "2024-12-01"

[site]
bucket = "./dist"

# Environment variables for the frontend build
[vars]
VITE_BACKEND_API_URL = "https://api.infinity-os.dev"
VITE_WS_URL = "wss://api.infinity-os.dev"