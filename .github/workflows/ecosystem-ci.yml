# ══════════════════════════════════════════════════════════════
# TRANCENDOS ECOSYSTEM — Reusable CI/CD Workflow
# ══════════════════════════════════════════════════════════════
# Triggers on push to main, runs build + test + security audit
# ══════════════════════════════════════════════════════════════

name: Ecosystem CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (staging/production)'
        required: false
        default: 'staging'

env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: pnpm run lint --if-present
        continue-on-error: true

  # ── Security Audit ───────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run ecosystem security audit
        run: bash scripts/security-audit.sh

      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

  # ── Build All Services ───────────────────────────────────
  build:
    name: Build Services
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        wave:
          - name: wave1-core
            services: infinity-portal
          - name: wave2-agents
            services: guardian-ai cornelius-ai dorris-ai norman-ai the-dr-ai
          - name: wave6-studios
            services: section7 style-and-shoot fabulousa tranceflow tateking the-digitalgrid
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.wave.name }}
        run: |
          for service in ${{ matrix.wave.services }}; do
            echo "Building ${service}..."
            if [ -d "wave6-studios/${service}" ]; then
              CONTEXT="wave6-studios/${service}"
            elif [ -d "services/${service}" ]; then
              CONTEXT="services/${service}"
            else
              CONTEXT="."
            fi
            docker build -t ${{ env.DOCKER_IMAGE_PREFIX }}/${service}:${{ github.sha }} \
              -t ${{ env.DOCKER_IMAGE_PREFIX }}/${service}:latest \
              ${CONTEXT} || echo "Warning: ${service} build failed"
          done

  # ── Integration Tests ────────────────────────────────────
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Start ecosystem (core services)
        run: |
          docker compose -f docker-compose.ecosystem.yml up -d \
            infinity-portal guardian-ai sentinel-ai prometheus-ai
        continue-on-error: true

      - name: Wait for services
        run: sleep 30

      - name: Health check
        run: bash scripts/health-check.sh --json || true

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.ecosystem.yml down -v

  # ── Deploy (manual trigger only) ─────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.deploy_target || 'staging' }}
    runs-on: ubuntu-latest
    needs: [build, security, test]
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.deploy_target || 'staging' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Deploy
        run: |
          echo "Deploying to ${{ github.event.inputs.deploy_target }}..."
          bash scripts/deploy-ecosystem.sh ${{ github.event.inputs.deploy_target }}