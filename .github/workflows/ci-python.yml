# .github/workflows/ci-python.yml
# Reusable CI workflow for all Python repositories
name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"
      run-security-scan:
        type: boolean
        default: true

  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ inputs.python-version || '3.11' }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install from backend/requirements.txt (Python code lives in backend/)
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install black flake8 isort mypy pytest pytest-cov || true

      - name: Format check (Black)
        run: black --check backend/ || true

      - name: Import sort check (isort)
        run: isort --check-only backend/ || true

      - name: Lint (Flake8)
        run: flake8 backend/ --max-line-length=120 --exclude=venv,alembic,__pycache__ || true

      - name: Type check (mypy)
        run: mypy backend/ --ignore-missing-imports || true

      - name: Test with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          JWT_SECRET_KEY: test-secret-key
          ENVIRONMENT: test
        run: |
          if [ -d backend ] && find backend -name "test_*.py" -o -name "*_test.py" | head -1 | grep -q .; then
            pytest backend/ --cov=backend --cov-report=xml --cov-report=term-missing -v || true
          else
            echo "No tests found in backend/ — skipping"
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
          if-no-files-found: warn
