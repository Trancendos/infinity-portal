# .github/workflows/ci.yml
# Infinity OS — Continuous Integration Pipeline
# Runs on every push and PR to main
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ─────────────────────────────────────────────────────────
  # Backend: Python Tests & Lint
  # ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest --tb=short -q --no-cov 2>&1 | tee test-results.txt
          # Extract summary line
          tail -1 test-results.txt
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./data/test.db"
          ENVIRONMENT: test
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.txt

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install flake8 bandit

      - name: Flake8 (syntax & style)
        run: flake8 --max-line-length=150 --exclude=__pycache__,alembic,.pytest_cache --count --statistics routers/ main.py auth.py config.py database.py || true

      - name: Bandit (security)
        run: bandit -r routers/ main.py auth.py -ll --skip B101 || true

  # ─────────────────────────────────────────────────────────
  # Frontend: TypeScript Build & Lint
  # ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Shell
        run: |
          cd apps/shell
          npx vite build
        env:
          VITE_BACKEND_API_URL: https://api.infinity-os.dev

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shell-dist
          path: apps/shell/dist

  # ─────────────────────────────────────────────────────────
  # Security: Dependency Audit
  # ─────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python dependency audit
        run: |
          pip install pip-audit
          cd backend && pip-audit -r requirements.txt --desc || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Node dependency audit
        run: pnpm audit --audit-level=high || true

  # ─────────────────────────────────────────────────────────
  # E2E Tests: Playwright
  # ─────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-build]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: apps/shell
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/shell
        run: npx playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: shell-dist
          path: apps/shell/dist

      - name: Run E2E tests
        working-directory: apps/shell
        run: npx playwright test --project=chromium --reporter=list
        env:
          CI: true
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/shell/playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/shell/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # Deploy Gate: All checks must pass
  # ─────────────────────────────────────────────────────────
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, e2e-tests, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed — ready for deployment"

  # ─────────────────────────────────────────────────────────
  # Auto-Deploy: Cloudflare Pages (on main push)
  # ─────────────────────────────────────────────────────────
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [deploy-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: shell-dist
          path: apps/shell/dist

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/shell/dist --project-name=infinity-os-shell --branch=main
        continue-on-error: true

      - name: Deployment status
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "🚀 Deployed to Cloudflare Pages: ${{ steps.deploy.outputs.url }}"
          else
            echo "⚠️ Cloudflare deployment skipped (secrets not configured)"
            echo "Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to GitHub Secrets"
          fi