# ============================================================
# Deploy to Cloudflare — Full Stack (Pages + Workers)
# ============================================================
# Deploys:
#   1. Frontend → Cloudflare Pages
#   2. API Gateway Worker → Cloudflare Workers
# ============================================================

name: Deploy to Cloudflare

on:
  workflow_call:
    inputs:
      environment:
        type: string
        default: "production"
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        default: "production"
        type: choice
        options:
          - production
          - staging
      deploy_frontend:
        description: "Deploy frontend to Pages"
        type: boolean
        default: true
      deploy_gateway:
        description: "Deploy API gateway worker"
        type: boolean
        default: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"

jobs:
  # ── Build Frontend ─────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_frontend != 'false' }}
    outputs:
      build-success: ${{ steps.build.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies (workspace)
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        id: build
        working-directory: apps/shell
        env:
          VITE_BACKEND_API_URL: ${{ inputs.environment == 'production' && 'https://infinity-auth-api.luminous-aimastermind.workers.dev' || 'https://infinity-auth-api-staging.luminous-aimastermind.workers.dev' }}
          VITE_WS_URL: ${{ inputs.environment == 'production' && 'wss://infinity-ws-api.luminous-aimastermind.workers.dev/ws' || 'wss://infinity-ws-api-staging.luminous-aimastermind.workers.dev/ws' }}
          VITE_APP_NAME: "Infinity Portal"
          VITE_APP_VERSION: ${{ github.sha }}
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/shell/dist
          retention-days: 1

  # ── Deploy Frontend to Pages ───────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: ${{ needs.build-frontend.result == 'success' }}
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Install wrangler globally
        run: npm install -g wrangler@latest

      - name: Create Pages project (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages project create infinity-portal --production-branch=main 2>&1 || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy dist \
            --project-name=infinity-portal \
            --branch=${{ inputs.environment == 'production' && 'main' || 'staging' }} \
            --commit-hash=${{ github.sha }}

      - name: Post-deploy frontend check
        run: |
          PAGES_URL="${{ inputs.environment == 'production' && 'https://infinity-portal.pages.dev' || 'https://staging.infinity-portal.pages.dev' }}"
          echo "Checking frontend at ${PAGES_URL} ..."
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PAGES_URL}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Frontend is live (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "⚠️  Frontend may still be propagating — check ${PAGES_URL} in a few minutes"

  # ── Deploy API Gateway Worker ──────────────────────────────
  deploy-gateway:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_gateway != 'false' }}
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install wrangler & typescript globally
        run: npm install -g wrangler@latest typescript

      - name: Resolve KV namespace IDs
        working-directory: workers/api-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e  # Don't exit on error — we handle failures gracefully

          # Create namespaces (will error if already exist — that's fine)
          wrangler kv namespace create "RATE_LIMIT" > /tmp/rl_out.txt 2>&1
          wrangler kv namespace create "CACHE" > /tmp/cache_out.txt 2>&1

          echo "=== RATE_LIMIT create output ==="
          cat /tmp/rl_out.txt

          echo "=== CACHE create output ==="
          cat /tmp/cache_out.txt

          # Extract IDs — wrangler v3/v4 both include 'id = "..."' in output
          RATE_LIMIT_ID=$(grep -oP '(?<=id = ")[^"]+' /tmp/rl_out.txt || echo "")
          CACHE_ID=$(grep -oP '(?<=id = ")[^"]+' /tmp/cache_out.txt || echo "")

          # If create failed (already exists), list and find by title
          if [ -z "$RATE_LIMIT_ID" ]; then
            echo "RATE_LIMIT create failed or already exists — listing namespaces..."
            wrangler kv namespace list > /tmp/kv_list.txt 2>&1
            cat /tmp/kv_list.txt
            RATE_LIMIT_ID=$(grep -B1 '"RATE_LIMIT"' /tmp/kv_list.txt | grep -oP '(?<="id": ")[^"]+' || echo "")
          fi

          if [ -z "$CACHE_ID" ]; then
            echo "CACHE create failed or already exists — listing namespaces..."
            wrangler kv namespace list > /tmp/kv_list2.txt 2>&1
            cat /tmp/kv_list2.txt
            CACHE_ID=$(grep -B1 '"CACHE"' /tmp/kv_list2.txt | grep -oP '(?<="id": ")[^"]+' || echo "")
          fi

          echo "Resolved RATE_LIMIT ID: ${RATE_LIMIT_ID:-<not found>}"
          echo "Resolved CACHE ID:      ${CACHE_ID:-<not found>}"

          # Inject IDs or strip placeholder bindings
          if [ -n "$RATE_LIMIT_ID" ]; then
            sed -i "s/placeholder-rate-limit-id/${RATE_LIMIT_ID}/g" wrangler.toml
            echo "✅ RATE_LIMIT KV injected"
          else
            echo "⚠️  Removing placeholder RATE_LIMIT KV binding"
            sed -i '/\[\[env\.production\.kv_namespaces\]\]/{N;N;/RATE_LIMIT/,/placeholder-rate-limit-id/d}' wrangler.toml || true
          fi

          if [ -n "$CACHE_ID" ]; then
            sed -i "s/placeholder-cache-id/${CACHE_ID}/g" wrangler.toml
            echo "✅ CACHE KV injected"
          else
            echo "⚠️  Removing placeholder CACHE KV binding"
            sed -i '/\[\[env\.production\.kv_namespaces\]\]/{N;N;/CACHE/,/placeholder-cache-id/d}' wrangler.toml || true
          fi

          echo "=== Final wrangler.toml ==="
          cat wrangler.toml
          set -e

      - name: Deploy API Gateway
        working-directory: workers/api-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ inputs.environment || 'production' }}"
          echo "Deploying gateway to environment: $ENV"
          wrangler deploy --env "$ENV"

      - name: Post-deploy gateway check
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER_URL="https://infinity-api-gateway.${CLOUDFLARE_ACCOUNT_ID}.workers.dev"
          echo "Checking gateway at ${WORKER_URL}/health ..."
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${WORKER_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API Gateway is live (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 5s..."
            sleep 5
          done
          echo "⚠️  Gateway may need warm-up time — check ${WORKER_URL}/health"

  # ── Deploy Auth API Worker ────────────────────────────────
  deploy-auth-api:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install wrangler globally
        run: npm install -g wrangler@latest typescript

      - name: Install auth-api dependencies
        working-directory: workers/auth-api
        run: pnpm install --no-frozen-lockfile

      - name: Create D1 database via REST API (idempotent)
        working-directory: workers/auth-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          ENV="${{ inputs.environment || 'production' }}"
          DB_NAME="infinity-os-db"
          if [ "$ENV" = "staging" ]; then DB_NAME="infinity-os-db-staging"; fi
          CF_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"

          echo "Checking if D1 database '$DB_NAME' exists..."
          LIST_RESP=$(curl -s -X GET "${CF_BASE}/d1/database?name=${DB_NAME}"             -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"             -H "Content-Type: application/json")
          echo "List response: $LIST_RESP"

          D1_ID=$(echo "$LIST_RESP" | jq -r '.result[0].uuid // .result[0].id // empty' 2>/dev/null || echo "")

          if [ -z "$D1_ID" ] || [ "$D1_ID" = "null" ]; then
            echo "Database not found — creating..."
            CREATE_RESP=$(curl -s -X POST "${CF_BASE}/d1/database"               -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"               -H "Content-Type: application/json"               -d "{"name": "${DB_NAME}"}")
            echo "Create response: $CREATE_RESP"
            D1_ID=$(echo "$CREATE_RESP" | jq -r '.result.uuid // .result.id // empty' 2>/dev/null || echo "")
          fi

          echo "D1 ID: ${D1_ID:-NOT_FOUND}"
          if [ -n "$D1_ID" ] && [ "$D1_ID" != "null" ] && [ "$D1_ID" != "" ]; then
            sed -i "s/placeholder-d1-id/${D1_ID}/g" wrangler.toml
            sed -i "s/placeholder-d1-staging-id/${D1_ID}/g" wrangler.toml
            echo "✅ D1 ID injected: $D1_ID"
            grep database_id wrangler.toml
          else
            echo "❌ Failed to get/create D1 database — check API token has D1 permissions"
            echo "Token permissions: https://dash.cloudflare.com/profile/api-tokens"
            exit 1
          fi

      - name: Run D1 migrations via REST API
        working-directory: workers/auth-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          ENV="${{ inputs.environment || 'production' }}"
          DB_NAME="infinity-os-db"
          if [ "$ENV" = "staging" ]; then DB_NAME="infinity-os-db-staging"; fi
          CF_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"

          # Get D1 database UUID
          D1_ID=$(curl -s "${CF_BASE}/d1/database?name=${DB_NAME}"             -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" |             jq -r '.result[0].uuid // .result[0].id // empty' 2>/dev/null || echo "")

          if [ -n "$D1_ID" ] && [ "$D1_ID" != "null" ]; then
            echo "Running migrations on $DB_NAME ($D1_ID)..."
            SQL=$(cat migrations/0001_initial.sql)
            MIG_RESP=$(curl -s -X POST "${CF_BASE}/d1/database/${D1_ID}/query"               -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"               -H "Content-Type: application/json"               -d "{"sql": $(echo "$SQL" | jq -Rs .)}")
            echo "Migration response: $(echo "$MIG_RESP" | jq -r '.success // .errors')"
            echo "✅ Migrations applied"
          else
            echo "⚠️  Could not find D1 database for migrations — skipping"
          fi
          set -e

      - name: Create Sessions KV namespace via REST API (idempotent)
        working-directory: workers/auth-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          CF_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          KV_TITLE="infinity-auth-api-SESSIONS"

          echo "Checking KV namespace '$KV_TITLE'..."
          LIST_RESP=$(curl -s "${CF_BASE}/storage/kv/namespaces?per_page=100"             -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "KV list response: $LIST_RESP"

          KV_ID=$(echo "$LIST_RESP" | jq -r ".result[] | select(.title == "${KV_TITLE}") | .id" 2>/dev/null | head -1 || echo "")

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "KV namespace not found — creating..."
            CREATE_RESP=$(curl -s -X POST "${CF_BASE}/storage/kv/namespaces"               -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"               -H "Content-Type: application/json"               -d "{"title": "${KV_TITLE}"}")
            echo "Create response: $CREATE_RESP"
            KV_ID=$(echo "$CREATE_RESP" | jq -r '.result.id // empty' 2>/dev/null || echo "")
          fi

          echo "Sessions KV ID: ${KV_ID:-NOT_FOUND}"
          if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ] && [ "$KV_ID" != "" ]; then
            sed -i "s/placeholder-sessions-kv-id/${KV_ID}/g" wrangler.toml
            sed -i "s/placeholder-sessions-kv-staging-id/${KV_ID}/g" wrangler.toml
            echo "✅ Sessions KV injected: $KV_ID"
          else
            echo "❌ Failed to get/create Sessions KV namespace"
            exit 1
          fi

      - name: Set SECRET_KEY secret
        working-directory: workers/auth-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ inputs.environment || 'production' }}"
          SECRET="${{ secrets.BACKEND_SECRET_KEY }}"
          if [ -z "$SECRET" ]; then
            SECRET=$(openssl rand -hex 32)
            echo "⚠️  No BACKEND_SECRET_KEY secret set — using generated key"
          fi
          echo "$SECRET" | wrangler secret put SECRET_KEY --env "$ENV" 2>&1 || true
          echo "✅ SECRET_KEY configured"

      - name: Verify wrangler.toml IDs before deploy
        working-directory: workers/auth-api
        run: |
          echo "=== wrangler.toml (checking IDs are injected) ==="
          cat wrangler.toml
          if grep -q "placeholder" wrangler.toml; then
            echo "ERROR: Placeholder IDs still present - ID injection failed"
            exit 1
          fi
          echo "All IDs are properly set"

      - name: Deploy Auth API Worker
        working-directory: workers/auth-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ inputs.environment || 'production' }}"
          echo "Deploying auth-api to: $ENV"
          wrangler deploy --env "$ENV"

      - name: Post-deploy auth API check
        run: |
          WORKER_URL="https://infinity-auth-api.luminous-aimastermind.workers.dev"
          echo "Checking auth API at ${WORKER_URL}/health ..."
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${WORKER_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Auth API is live (attempt $i)"
              curl -s "${WORKER_URL}/health"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "⚠️  Auth API may still be starting"

  # ── Deploy AI API Worker ──────────────────────────────────
  deploy-ai-api:
    runs-on: ubuntu-latest
    needs: deploy-auth-api
    if: always()
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install wrangler globally
        run: npm install -g wrangler@latest typescript
      - name: Create AI cache KV (idempotent)
        working-directory: workers/ai-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          CREATE_OUT=$(wrangler kv namespace create "AI_CACHE" 2>&1 || true)
          KV_ID=$(echo "$CREATE_OUT" | grep -oP '(?<=id = ")[^"]+' || true)
          if [ -z "$KV_ID" ]; then
            KV_ID=$(wrangler kv namespace list 2>&1 | grep -B1 '"AI_CACHE"' | grep -oP '(?<="id": ")[^"]+' || true)
          fi
          if [ -n "$KV_ID" ]; then
            sed -i "s/placeholder-ai-cache-id/${KV_ID}/g" wrangler.toml
            sed -i "s/placeholder-ai-cache-staging-id/${KV_ID}/g" wrangler.toml
          fi
          set -e
      - name: Deploy AI API Worker
        working-directory: workers/ai-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --env ${{ inputs.environment || 'production' }} 2>&1 || echo "AI API deploy failed (Workers AI may need paid plan)"

  # ── Deploy Files API Worker ───────────────────────────────
  deploy-files-api:
    runs-on: ubuntu-latest
    needs: deploy-auth-api
    if: always()
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install wrangler globally
        run: npm install -g wrangler@latest typescript
      - name: Create R2 bucket (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 bucket create infinity-portal-files 2>&1 || true
          echo "R2 bucket ready"
      - name: Inject D1 ID into files wrangler.toml
        working-directory: workers/files-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          D1_ID=$(wrangler d1 list 2>&1 | grep "infinity-os-db" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || true)
          if [ -n "$D1_ID" ]; then
            sed -i "s/placeholder-d1-id/${D1_ID}/g" wrangler.toml
            sed -i "s/placeholder-d1-staging-id/${D1_ID}/g" wrangler.toml
          fi
          set -e
      - name: Deploy Files API Worker
        working-directory: workers/files-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --env ${{ inputs.environment || 'production' }} 2>&1 || echo "Files API deploy failed"

  # ── Deploy WebSocket API Worker ───────────────────────────
  deploy-ws-api:
    runs-on: ubuntu-latest
    needs: deploy-auth-api
    if: always()
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install wrangler globally
        run: npm install -g wrangler@latest typescript
      - name: Deploy WebSocket API Worker
        working-directory: workers/ws-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --env ${{ inputs.environment || 'production' }} 2>&1 || echo "WS API deploy failed (Durable Objects may need paid plan)"

  # ── Summary ───────────────────────────────────────────────
  deploy-summary:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-gateway, deploy-auth-api, deploy-ai-api, deploy-files-api, deploy-ws-api]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  ∞  INFINITY PORTAL — Deploy Summary         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Environment: ${{ inputs.environment || 'production' }}"
          echo "║  Frontend:    ${{ needs.deploy-frontend.result || 'skipped' }}"
          echo "║  Gateway:     ${{ needs.deploy-gateway.result || 'skipped' }}"
          echo "║  Auth API:    ${{ needs.deploy-auth-api.result || 'skipped' }}"
          echo "║  AI API:      ${{ needs.deploy-ai-api.result || 'skipped' }}"
          echo "║  Files API:   ${{ needs.deploy-files-api.result || 'skipped' }}"
          echo "║  WS API:      ${{ needs.deploy-ws-api.result || 'skipped' }}"
          echo "║  Commit:      ${{ github.sha }}"
          echo "║  Triggered:   ${{ github.actor }}"
          echo "╚══════════════════════════════════════════════╝"