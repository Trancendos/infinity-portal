# ============================================================
# Deploy to Cloudflare — Full Stack (Pages + Workers)
# ============================================================
# Deploys:
#   1. Frontend → Cloudflare Pages
#   2. API Gateway Worker → Cloudflare Workers
# ============================================================

name: Deploy to Cloudflare

on:
  workflow_call:
    inputs:
      environment:
        type: string
        default: "production"
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        default: "production"
        type: choice
        options:
          - production
          - staging
      deploy_frontend:
        description: "Deploy frontend to Pages"
        type: boolean
        default: true
      deploy_gateway:
        description: "Deploy API gateway worker"
        type: boolean
        default: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"

jobs:
  # ── Build Frontend ─────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_frontend != 'false' }}
    outputs:
      build-success: ${{ steps.build.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies (workspace)
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        id: build
        working-directory: apps/shell
        env:
          VITE_BACKEND_API_URL: ${{ inputs.environment == 'production' && 'https://api.infinity-portal.com' || 'https://api-staging.infinity-portal.com' }}
          VITE_WS_URL: ${{ inputs.environment == 'production' && 'wss://api.infinity-portal.com/ws' || 'wss://api-staging.infinity-portal.com/ws' }}
          VITE_APP_NAME: "Infinity Portal"
          VITE_APP_VERSION: ${{ github.sha }}
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/shell/dist
          retention-days: 1

  # ── Deploy Frontend to Pages ───────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: ${{ needs.build-frontend.result == 'success' }}
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Install wrangler globally
        run: npm install -g wrangler@latest

      - name: Create Pages project (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages project create infinity-portal --production-branch=main 2>&1 || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy dist \
            --project-name=infinity-portal \
            --branch=${{ inputs.environment == 'production' && 'main' || 'staging' }} \
            --commit-hash=${{ github.sha }}

      - name: Post-deploy frontend check
        run: |
          PAGES_URL="${{ inputs.environment == 'production' && 'https://infinity-portal.pages.dev' || 'https://staging.infinity-portal.pages.dev' }}"
          echo "Checking frontend at ${PAGES_URL} ..."
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PAGES_URL}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Frontend is live (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "⚠️  Frontend may still be propagating — check ${PAGES_URL} in a few minutes"

  # ── Deploy API Gateway Worker ──────────────────────────────
  deploy-gateway:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_gateway != 'false' }}
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install wrangler & typescript globally
        run: npm install -g wrangler@latest typescript

      - name: Resolve KV namespace IDs
        working-directory: workers/api-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e  # Don't exit on error — we handle failures gracefully

          # Create namespaces (will error if already exist — that's fine)
          wrangler kv namespace create "RATE_LIMIT" > /tmp/rl_out.txt 2>&1
          wrangler kv namespace create "CACHE" > /tmp/cache_out.txt 2>&1

          echo "=== RATE_LIMIT create output ==="
          cat /tmp/rl_out.txt

          echo "=== CACHE create output ==="
          cat /tmp/cache_out.txt

          # Extract IDs — wrangler v3/v4 both include 'id = "..."' in output
          RATE_LIMIT_ID=$(grep -oP '(?<=id = ")[^"]+' /tmp/rl_out.txt || echo "")
          CACHE_ID=$(grep -oP '(?<=id = ")[^"]+' /tmp/cache_out.txt || echo "")

          # If create failed (already exists), list and find by title
          if [ -z "$RATE_LIMIT_ID" ]; then
            echo "RATE_LIMIT create failed or already exists — listing namespaces..."
            wrangler kv namespace list > /tmp/kv_list.txt 2>&1
            cat /tmp/kv_list.txt
            RATE_LIMIT_ID=$(grep -B1 '"RATE_LIMIT"' /tmp/kv_list.txt | grep -oP '(?<="id": ")[^"]+' || echo "")
          fi

          if [ -z "$CACHE_ID" ]; then
            echo "CACHE create failed or already exists — listing namespaces..."
            wrangler kv namespace list > /tmp/kv_list2.txt 2>&1
            cat /tmp/kv_list2.txt
            CACHE_ID=$(grep -B1 '"CACHE"' /tmp/kv_list2.txt | grep -oP '(?<="id": ")[^"]+' || echo "")
          fi

          echo "Resolved RATE_LIMIT ID: ${RATE_LIMIT_ID:-<not found>}"
          echo "Resolved CACHE ID:      ${CACHE_ID:-<not found>}"

          # Inject IDs or strip placeholder bindings
          if [ -n "$RATE_LIMIT_ID" ]; then
            sed -i "s/placeholder-rate-limit-id/${RATE_LIMIT_ID}/g" wrangler.toml
            echo "✅ RATE_LIMIT KV injected"
          else
            echo "⚠️  Removing placeholder RATE_LIMIT KV binding"
            sed -i '/\[\[env\.production\.kv_namespaces\]\]/{N;N;/RATE_LIMIT/,/placeholder-rate-limit-id/d}' wrangler.toml || true
          fi

          if [ -n "$CACHE_ID" ]; then
            sed -i "s/placeholder-cache-id/${CACHE_ID}/g" wrangler.toml
            echo "✅ CACHE KV injected"
          else
            echo "⚠️  Removing placeholder CACHE KV binding"
            sed -i '/\[\[env\.production\.kv_namespaces\]\]/{N;N;/CACHE/,/placeholder-cache-id/d}' wrangler.toml || true
          fi

          echo "=== Final wrangler.toml ==="
          cat wrangler.toml
          set -e

      - name: Deploy API Gateway
        working-directory: workers/api-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV="${{ inputs.environment || 'production' }}"
          echo "Deploying gateway to environment: $ENV"
          wrangler deploy --env "$ENV"

      - name: Post-deploy gateway check
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER_URL="https://infinity-api-gateway.${CLOUDFLARE_ACCOUNT_ID}.workers.dev"
          echo "Checking gateway at ${WORKER_URL}/health ..."
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${WORKER_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API Gateway is live (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 5s..."
            sleep 5
          done
          echo "⚠️  Gateway may need warm-up time — check ${WORKER_URL}/health"

  # ── Summary ───────────────────────────────────────────────
  deploy-summary:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-gateway]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  ∞  INFINITY PORTAL — Deploy Summary         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Environment: ${{ inputs.environment || 'production' }}"
          echo "║  Frontend:    ${{ needs.deploy-frontend.result || 'skipped' }}"
          echo "║  Gateway:     ${{ needs.deploy-gateway.result || 'skipped' }}"
          echo "║  Commit:      ${{ github.sha }}"
          echo "║  Triggered:   ${{ github.actor }}"
          echo "╚══════════════════════════════════════════════╝"