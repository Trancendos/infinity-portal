# ============================================================
# Deploy to Cloudflare — Full Stack (Pages + Workers)
# ============================================================
# Deploys:
#   1. Frontend → Cloudflare Pages
#   2. API Gateway Worker → Cloudflare Workers
# ============================================================

name: Deploy to Cloudflare

on:
  workflow_call:
    inputs:
      environment:
        type: string
        default: "production"
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        default: "production"
        type: choice
        options:
          - production
          - staging
      deploy_frontend:
        description: "Deploy frontend to Pages"
        type: boolean
        default: true
      deploy_gateway:
        description: "Deploy API gateway worker"
        type: boolean
        default: true

env:
  NODE_VERSION: "20"

jobs:
  # ── Build Frontend ─────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_frontend != 'false' }}
    outputs:
      build-success: ${{ steps.build.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: apps/shell
        run: npm ci

      - name: Build frontend
        id: build
        working-directory: apps/shell
        env:
          VITE_BACKEND_API_URL: ${{ inputs.environment == 'production' && 'https://api.infinity-portal.com' || 'https://api-staging.infinity-portal.com' }}
          VITE_WS_URL: ${{ inputs.environment == 'production' && 'wss://api.infinity-portal.com/ws' || 'wss://api-staging.infinity-portal.com/ws' }}
          VITE_APP_NAME: "Infinity Portal"
          VITE_APP_VERSION: ${{ github.sha }}
        run: npx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/shell/dist
          retention-days: 1

  # ── Deploy Frontend to Pages ───────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: ${{ needs.build-frontend.result == 'success' }}
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=infinity-portal --branch=${{ inputs.environment == 'production' && 'main' || 'staging' }}

      - name: Post-deploy frontend check
        run: |
          PAGES_URL="${{ inputs.environment == 'production' && 'https://infinity-portal.pages.dev' || 'https://staging.infinity-portal.pages.dev' }}"
          echo "Checking frontend at ${PAGES_URL} ..."

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PAGES_URL}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Frontend is live (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done

          echo "⚠️ Frontend may still be propagating"

  # ── Deploy API Gateway Worker ──────────────────────────
  deploy-gateway:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_gateway != 'false' }}
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install worker dependencies
        working-directory: workers/api-gateway
        run: npm install wrangler typescript --save-dev 2>/dev/null || true

      - name: Deploy API Gateway
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/api-gateway
          command: deploy --env ${{ inputs.environment || 'production' }}

      - name: Post-deploy gateway check
        run: |
          WORKER_URL="https://infinity-api-gateway.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
          echo "Checking gateway at ${WORKER_URL}/health ..."

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${WORKER_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API Gateway is live (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 5s..."
            sleep 5
          done

          echo "⚠️ Gateway may need warm-up time"

  # ── Summary ────────────────────────────────────────────
  deploy-summary:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-gateway]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  ∞  INFINITY PORTAL — Deploy Summary     ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Environment: ${{ inputs.environment || 'production' }}"
          echo "║  Frontend:    ${{ needs.deploy-frontend.result || 'skipped' }}"
          echo "║  Gateway:     ${{ needs.deploy-gateway.result || 'skipped' }}"
          echo "║  Commit:      ${{ github.sha }}"
          echo "║  Triggered:   ${{ github.actor }}"
          echo "╚══════════════════════════════════════════╝"