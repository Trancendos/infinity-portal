# .github/workflows/deploy-cloudflare-pages.yml
# Deploy Infinity OS Shell to Cloudflare Pages
# Backend runs on Cloudflare Workers / Docker on any VPS behind Cloudflare Tunnel
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/shell/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'

jobs:
  check-credentials:
    name: Check Cloudflare credentials configured
    runs-on: ubuntu-latest
    outputs:
      has_credentials: ${{ steps.check.outputs.has_credentials }}
    steps:
      - name: Check if CLOUDFLARE_API_TOKEN secret is set
        id: check
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
            echo "Cloudflare credentials configured - will deploy"
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
            echo "CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not set - skipping deploy"
          fi

  deploy-frontend:
    name: Deploy Shell to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.has_credentials == 'true'
    # Note: environment block removed to allow if: condition to work properly
    # (environment: block can override if: evaluation in some GH Actions versions)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Shell
        run: |
          cd apps/shell
          npx vite build
        env:
          VITE_BACKEND_API_URL: ${{ vars.BACKEND_API_URL || 'https://api.infinity-os.dev' }}
          VITE_WS_URL: ${{ vars.WS_URL || 'wss://api.infinity-os.dev' }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/shell/dist --project-name=infinity-os-shell --branch=${{ github.ref_name }}

      - name: Post-deploy health check
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          echo "🚀 Deployed to: ${DEPLOY_URL}"
          
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 5s..."
            sleep 5
          done
          
          echo "⚠️ Health check did not return 200 after 5 attempts"