# ============================================================
# Infinity Portal — API Gateway Worker
# ============================================================
# Edge proxy that routes requests to the backend API
# with caching, rate limiting, and CORS handling.
# ============================================================

name = "infinity-api-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Production environment
[env.production]
name = "infinity-api-gateway"
routes = [
  { pattern = "api.infinity-portal.com/*", zone_name = "infinity-portal.com" }
]

[env.production.vars]
ENVIRONMENT = "production"
BACKEND_ORIGIN = "https://infinity-backend.fly.dev"
RATE_LIMIT_RPM = "120"
CACHE_TTL = "60"

# Staging environment
[env.staging]
name = "infinity-api-gateway-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
BACKEND_ORIGIN = "https://infinity-backend-staging.fly.dev"
RATE_LIMIT_RPM = "300"
CACHE_TTL = "30"

# KV Namespaces for rate limiting & caching
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "placeholder-rate-limit-id"

[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-cache-id"