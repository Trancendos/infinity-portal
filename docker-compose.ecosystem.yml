# ============================================================
# Trancendos Ecosystem — Local Development Compose
# All 23 services + infrastructure | 2060-ready mesh routing
# ============================================================
# Usage:
#   docker compose -f docker-compose.ecosystem.yml up -d
#   docker compose -f docker-compose.ecosystem.yml logs -f guardian-ai
#   docker compose -f docker-compose.ecosystem.yml down
# ============================================================

version: "3.9"

x-common-env: &common-env
  NODE_ENV: development
  IAM_ENABLED: "true"
  IAM_JWT_SECRET: "${IAM_JWT_SECRET:-trancendos-dev-secret-change-in-production}"
  IAM_JWT_ALGORITHM: HS512
  MESH_ROUTING_PROTOCOL: static_port
  LOG_LEVEL: debug
  NEON_DATABASE_URL: "${NEON_DATABASE_URL:-postgresql://localhost:5432/trancendos}"

x-common-healthcheck: &common-healthcheck
  interval: 30s
  timeout: 10s
  start_period: 15s
  retries: 3

services:
  # ──────────────────────────────────────────────
  # WAVE 1: Core Platform (Infinity Portal)
  # ──────────────────────────────────────────────
  infinity-portal:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      SERVICE_NAME: infinity-portal
      PORT: "3000"
      MESH_ADDRESS: "infinity-portal:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      <<: *common-healthcheck
    networks:
      - trancendos-mesh
    restart: unless-stopped

  # ──────────────────────────────────────────────
