    name: trancendos-mesh
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ──────────────────────────────────────────────
# Port Map Reference:
# ──────────────────────────────────────────────
# 3000  infinity-portal    (Wave 1 — Core Platform)
# 3010  guardian-ai         (Wave 2 — Security Gateway)
# 3011  cornelius-ai        (Wave 2 — Orchestrator)
# 3012  dorris-ai           (Wave 2 — Financial Chief)
# 3013  norman-ai           (Wave 2 — Security Intel)
# 3014  the-dr-ai           (Wave 2 — Autonomous Healing)
# 3020  the-agora           (Wave 3 — Forum Engine)
# 3021  the-citadel         (Wave 3 — Defense Engine)
# 3022  the-hive            (Wave 3 — Swarm Intelligence)
# 3023  the-library         (Wave 3 — Knowledge Base)
# 3024  the-nexus           (Wave 3 — Integration Hub)
# 3025  the-observatory     (Wave 3 — Analytics Engine)
# 3026  the-treasury        (Wave 3 — Resource Manager)
# 3027  the-workshop        (Wave 3 — Code Quality)
# 3028  arcadia             (Wave 3 — Community/Marketplace)
# 3030  serenity-ai         (Wave 4 — Wellness Monitor)
# 3031  oracle-ai           (Wave 4 — Prediction/Forecast)
# 3032  porter-family-ai    (Wave 4 — Portfolio Mgmt)
# 3033  prometheus-ai       (Wave 4 — Monitoring/Alerting)
# 3034  queen-ai            (Wave 4 — Hive Coordinator)
# 3035  renik-ai            (Wave 4 — Crypto Key Mgmt)
# 3036  sentinel-ai         (Wave 4 — Service Health)
# 3037  solarscene-ai       (Wave 4 — Operations/Workflow)
# 3040  api-marketplace     (Wave 5 — API Discovery/Publishing)
# 3041  artifactory         (Wave 5 — Artifact Registry/Storage)