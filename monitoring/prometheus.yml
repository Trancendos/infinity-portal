# Prometheus Configuration — Infinity OS Platform
# Scrapes: Platform Core workers + infrastructure + agents + existing services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'infinity-portal'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - 'alerts/*.yml'

# ─── Scrape configurations ────────────────────────────────────────────────────
scrape_configs:

  # ── Self-monitoring ──────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Infrastructure ───────────────────────────────────────────────────────────
  # Node Exporter — Oracle ARM K3s node system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'oracle-arm-01'

  # ── Application ──────────────────────────────────────────────────────────────
  # Infinity OS Shell (React PWA served via Node)
  - job_name: 'infinity-portal'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'infinity-portal-app'

  # API Gateway (The Nexus)
  - job_name: 'api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'infinity-portal-gateway'

  # FastAPI Backend
  - job_name: 'fastapi-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'infinity-portal-backend'

  # AI Service
  - job_name: 'ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'infinity-portal-ai'

  # ── Platform Core Workers ─────────────────────────────────────────────────────
  # Infinity-One IAM Worker — identity, sessions, policy evaluation
  - job_name: 'infinity-one'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['iam-worker:9091']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'platform-core-iam'
      - target_label: component
        replacement: 'infinity-one'

  # Lighthouse Crypto Worker — token issuance, key rotation, PQC ops
  - job_name: 'lighthouse'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['crypto-worker:9092']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'platform-core-lighthouse'
      - target_label: component
        replacement: 'lighthouse'

  # HIVE Orchestration Worker — agent swarm, task queue, Canon enforcement
  - job_name: 'hive'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['hive-worker:9093']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'platform-core-hive'
      - target_label: component
        replacement: 'hive'

  # The Void Vault Worker — secrets, encrypted blobs, crypto-shredding
  - job_name: 'void'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['vault-worker:9094']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'platform-core-void'
      - target_label: component
        replacement: 'void'

  # ── AI Agents ─────────────────────────────────────────────────────────────────
  # Tier 1 Agents — Core Intelligence
  - job_name: 'agent-norman-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['norman-ai:9200']
    relabel_configs:
      - target_label: agent_tier
        replacement: '1'
      - target_label: agent_name
        replacement: 'norman-ai'

  - job_name: 'agent-guardian-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['guardian-ai:9201']
    relabel_configs:
      - target_label: agent_tier
        replacement: '1'
      - target_label: agent_name
        replacement: 'guardian-ai'

  - job_name: 'agent-mercury-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mercury-ai:9202']
    relabel_configs:
      - target_label: agent_tier
        replacement: '1'
      - target_label: agent_name
        replacement: 'mercury-ai'

  - job_name: 'agent-chronos-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['chronos-ai:9203']
    relabel_configs:
      - target_label: agent_tier
        replacement: '1'
      - target_label: agent_name
        replacement: 'chronos-ai'

  - job_name: 'agent-cornelius-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['cornelius-ai:9204']
    relabel_configs:
      - target_label: agent_tier
        replacement: '1'
      - target_label: agent_name
        replacement: 'cornelius-ai'

  # Tier 2 & 3 Agents — scraped via K3s pod discovery (see kubernetes-pods below)

  # ── Databases ─────────────────────────────────────────────────────────────────
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'infinity-portal-db'

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'infinity-portal-redis'

  # ── K3s / Kubernetes Pod Discovery ───────────────────────────────────────────
  # Auto-discovers all pods with prometheus.io/scrape: "true" annotation
  # This covers Tier 2 & 3 agents, Platform Core sidecars, etc.
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
      # Add platform component label from pod labels
      - source_labels: [__meta_kubernetes_pod_label_app_component]
        action: replace
        target_label: component
      - source_labels: [__meta_kubernetes_pod_label_agent_name]
        action: replace
        target_label: agent_name
      - source_labels: [__meta_kubernetes_pod_label_agent_tier]
        action: replace
        target_label: agent_tier