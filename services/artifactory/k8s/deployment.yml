# ═══════════════════════════════════════════════════════════════════════
# THE ARTIFACTORY — Kubernetes Deployment
# Part of the Trancendos Ecosystem
# ═══════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: the-artifactory
  namespace: trancendos
  labels:
    app: the-artifactory
    app.kubernetes.io/name: the-artifactory
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: artifact-registry
    app.kubernetes.io/part-of: trancendos-ecosystem
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: the-artifactory
  template:
    metadata:
      labels:
        app: the-artifactory
        app.kubernetes.io/name: the-artifactory
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3020"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: the-artifactory
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: the-artifactory
          image: ghcr.io/trancendos/the-artifactory:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3020
              protocol: TCP
          envFrom:
            - configMapRef:
                name: the-artifactory-config
            - secretRef:
                name: the-artifactory-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: cache
          emptyDir:
            sizeLimit: 500Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: the-artifactory