# ============================================================
# Cloudflare Tunnel Configuration — Infinity OS
# Zero-cost secure ingress — no open inbound ports required
# Replaces load balancers, NAT, and public IP requirements
#
# Setup:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/install-and-setup/
#   2. Authenticate: cloudflared tunnel login
#   3. Create tunnel: cloudflared tunnel create infinity-os
#   4. Copy tunnel ID to TUNNEL_ID below
#   5. Run: cloudflared tunnel --config infrastructure/cloudflare/tunnel.yml run
#
# Alternative: Use the Cloudflare Setup Runner at tools/cloudflare-setup/index.html
#   or the Cloudflare Management Console in Infinity Admin OS
#
# ISO 27001: A.13.1 Network security management
# Zero Trust: All traffic routed through Cloudflare's network
# ============================================================

tunnel: ${CLOUDFLARE_TUNNEL_ID}
credentials-file: /etc/cloudflared/credentials.json

# Logging
loglevel: info
logfile: /var/log/cloudflared/tunnel.log

# Metrics endpoint for The Observatory
metrics: 0.0.0.0:2000

ingress:
  # ============================================================
  # CORE PLATFORM SERVICES
  # ============================================================

  # Main OS Shell — React PWA
  - hostname: infinity-os.${DOMAIN}
    service: http://localhost:5173
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s
      tcpKeepAlive: 30s
      httpHostHeader: infinity-os.${DOMAIN}

  # API Marketplace Gateway — centralised routing
  - hostname: api.${DOMAIN}
    service: http://localhost:3033
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s
      httpHostHeader: api.${DOMAIN}

  # Identity — Infinity One IAM (CF Worker in production)
  - hostname: identity.${DOMAIN}
    service: http://localhost:8787
    originRequest:
      noTLSVerify: false

  # ============================================================
  # ECOSYSTEM MESH SERVICES
  # ============================================================

  # The Nexus — AI Service Mesh
  - hostname: nexus.${DOMAIN}
    service: http://localhost:3029
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s

  # The Hive — Data/Files Mesh
  - hostname: hive.${DOMAIN}
    service: http://localhost:3027
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s

  # The Observatory — Observability (metrics, logging, alerts)
  - hostname: observatory.${DOMAIN}
    service: http://localhost:3028
    originRequest:
      noTLSVerify: false

  # The Void — Quantum-safe secrets vault (restrict via Cloudflare Access)
  - hostname: void.${DOMAIN}
    service: http://localhost:8200
    originRequest:
      noTLSVerify: false

  # The DigitalGrid — CI/CD platform
  - hostname: grid.${DOMAIN}
    service: http://localhost:3032
    originRequest:
      noTLSVerify: false

  # Chaos Party — Testing suite
  - hostname: chaos.${DOMAIN}
    service: http://localhost:3031
    originRequest:
      noTLSVerify: false

  # API Marketplace — API catalogue
  - hostname: marketplace.${DOMAIN}
    service: http://localhost:3033
    originRequest:
      noTLSVerify: false

  # ============================================================
  # PILLAR AI AGENTS
  # ============================================================

  # Guardian AI — System guardian
  - hostname: guardian.${DOMAIN}
    service: http://localhost:3001
    originRequest:
      noTLSVerify: false

  # Oracle AI — Knowledge oracle
  - hostname: oracle.${DOMAIN}
    service: http://localhost:3002
    originRequest:
      noTLSVerify: false

  # Prometheus AI — Void guardian
  - hostname: prometheus.${DOMAIN}
    service: http://localhost:3003
    originRequest:
      noTLSVerify: false

  # Sentinel AI — Security sentinel
  - hostname: sentinel.${DOMAIN}
    service: http://localhost:3004
    originRequest:
      noTLSVerify: false

  # ============================================================
  # PLATFORM SERVICES
  # ============================================================

  # The Agora — Community forum
  - hostname: agora.${DOMAIN}
    service: http://localhost:3020
    originRequest:
      noTLSVerify: false

  # The Library — Knowledge base
  - hostname: library.${DOMAIN}
    service: http://localhost:3021
    originRequest:
      noTLSVerify: false

  # The Citadel — Security operations
  - hostname: citadel.${DOMAIN}
    service: http://localhost:3022
    originRequest:
      noTLSVerify: false

  # The Treasury — Financial management
  - hostname: treasury.${DOMAIN}
    service: http://localhost:3023
    originRequest:
      noTLSVerify: false

  # The Workshop — Development sandbox
  - hostname: workshop.${DOMAIN}
    service: http://localhost:3024
    originRequest:
      noTLSVerify: false

  # Filesystem Worker
  - hostname: filesystem.${DOMAIN}
    service: http://localhost:8788

  # ============================================================
  # ADMIN & MANAGEMENT
  # ============================================================

  # Cloudflare Management Console
  - hostname: admin.${DOMAIN}
    service: http://localhost:5174
    originRequest:
      noTLSVerify: false

  # ============================================================
  # CATCH-ALL
  # ============================================================

  # Return 404 for unmatched routes
  - service: http_status:404